<!DOCTYPE html>
<html>
<head>
    <title>VibeStream Pro</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a0033, #000814);
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        nav {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }

        nav a {
            color: #00eaff;
            margin: 15px;
            text-decoration: none;
        }

        /* LOGIN */
        .login-box {
            width: 320px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            color: white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* PLAYER */
        .player {
            text-align: center;
            margin-top: 30px;
        }

        .cover {
            width: 200px;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }

        .playing {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .controls button {
            margin: 5px;
        }

        .progress {
            width: 60%;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            width: 200px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginSection">
    <h2>🎧 VibeStream Pro</h2>
    <form onsubmit="login(event)">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="errorMsg" style="color:red;"></p>
    </form>
</div>

<!-- MAIN -->
<div id="mainWebsite" class="hidden">

<header>
    <h1>🎶 VibeStream Pro</h1>
</header>

<nav>
    <a href="#">Discover</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<!-- AUDIO PLAYER -->
<div class="player">

    <img id="cover" class="cover" src="">

    <h2 id="title">No song playing</h2>

    <audio id="audioPlayer"></audio>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="togglePlay()">⏯</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <br>

    <input type="range" id="progress" class="progress" value="0">
    <br>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <p id="likeStatus"></p>
    <button onclick="likeSong()">❤️ Like</button>

</div>

<!-- SONG LIST -->
<div class="container">

    <div class="card">
        <img src="Somniomancer.png">
        <h3>Somniomancer</h3>
        <button onclick="loadSong(0)">Play</button>
    </div>

    <div class="card">
        <img src="Through Patches of Violet.png">
        <h3>Through Patches of Violet</h3>
        <button onclick="loadSong(1)">Play</button>
    </div>

    <div class="card">
        <img src="BIRDBRAIN.png">
        <h3>BIRDBRAIN</h3>
        <button onclick="loadSong(2)">Play</button>
    </div>

</div>

</div>

<script>
/* LOGIN */
function login(e){
    e.preventDefault();
    let u = username.value;
    let p = password.value;

    if(u==="vibe" && p==="2026"){
        loginSection.classList.add("hidden");
        mainWebsite.classList.remove("hidden");
    } else {
        errorMsg.textContent="Invalid login!";
    }
}

function logout(){
    mainWebsite.classList.add("hidden");
    loginSection.classList.remove("hidden");
}

/* PLAYER */
let songs = [
    {file:"Somniomancer.mp3", title:"Somniomancer", cover:"Somniomancer.png"},
    {file:"Through Patches of Violet.mp3", title:"Through Patches of Violet.png", cover:"Through Patches of Violet.png"},
    {file:"BIRDBRAIN.mp3", title:"BIRDBRAIN", cover:"BIRDBRAIN.png"}
];

let index = 0;
let audio = document.getElementById("audioPlayer");

function loadSong(i){
    index = i;

    audio.pause();              // stop current
    audio.src = songs[i].file;  // set new source
    audio.load();               // force reload

    title.textContent = songs[i].title;
    cover.src = songs[i].cover;

    audio.play().catch(() => {}); // avoid autoplay error
    cover.classList.add("playing");
}

/* PLAY / PAUSE */
function togglePlay(){
    if(audio.paused){
        audio.play();
        cover.classList.add("playing");
    } else {
        audio.pause();
        cover.classList.remove("playing");
    }
}

/* NEXT / PREV */
function nextSong(){
    index = (index + 1) % songs.length;
    loadSong(index);
}

function prevSong(){
    index = (index - 1 + songs.length) % songs.length;
    loadSong(index);
}

/* LIKE */
function likeSong(){
    likeStatus.textContent = "❤️ You liked: " + songs[index].title;
}

/* AUTO NEXT */
audio.addEventListener("ended", nextSong);

/* PROGRESS BAR SAFE */
audio.addEventListener("timeupdate", ()=>{
    if(!isNaN(audio.duration)){
        progress.value = (audio.currentTime / audio.duration) * 100;
    }
});

progress.addEventListener("input", ()=>{
    if(!isNaN(audio.duration)){
        audio.currentTime = (progress.value / 100) * audio.duration;
    }
});

/* VOLUME */
volume.addEventListener("input", ()=>{
    audio.volume = volume.value;
});
</script>

</body>
</html>
